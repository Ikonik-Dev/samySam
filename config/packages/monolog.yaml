monolog:
    # Déclaration de channels personnalisés. On ajoute un canal `order`
    # qui servira pour logger spécifiquement les erreurs liées au processus
    # de commande (checkout, création de commande, etc.). Cela permet de
    # séparer ces logs des logs applicatifs généraux.
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        - order

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]
            # Handler dédié pour les erreurs de commande durant le dev
            order:
                type: stream
                path: "%kernel.logs_dir%/order_%kernel.environment%.log"
                level: error
                channels: [order]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
            # Handler dédié pour les erreurs de commande durant les tests
            order:
                type: stream
                path: "%kernel.logs_dir%/order_%kernel.environment%.log"
                level: error
                channels: [order]

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
            # Handler dédié pour les erreurs de commande en production.
            # On logge au format JSON (facilement ingérable par des outils
            # de monitoring) et on écrit dans un fichier séparé.
            order:
                type: stream
                path: "%kernel.logs_dir%/order_%kernel.environment%.log"
                level: error
                channels: [order]
                formatter: monolog.formatter.json
